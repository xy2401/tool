<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OpenAPI Editor</title>
  
  <!-- CodeMirror for Editor -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/yaml/yaml.min.js"></script>

  <!-- Swagger UI -->
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css" />
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>

  <!-- js-yaml -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

  <style>
    html, body {
      height: 100%; margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column;
    }
    .toolbar {
      padding: 12px;
      background: #f8f9fa;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .toolbar h3 { margin: 0; font-size: 16px; color: #333; }
    .btn {
      padding: 6px 12px; border: 1px solid #ccc; background: white; border-radius: 4px; cursor: pointer; font-size: 14px;
    }
    .btn:hover { background: #f0f0f0; }
    select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
    .main {
      display: flex; flex: 1; overflow: hidden;
    }
    .editor-section {
      flex: 1; display: flex; flex-direction: column; border-right: 2px solid #ddd;
    }
    #editor-pane { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .CodeMirror { flex: 1; font-size: 14px; font-family: Consolas, "Courier New", monospace; }
    .swagger-section {
      flex: 1; overflow-y: auto; background: #fafafa;
    }
    .status { font-size: 12px; color: #666; margin-left: auto; }
  </style>
</head>
<body>

  <div class="toolbar">
    <h3>OpenAPI Editor</h3>
    
    <select id="file-select">
      <option value="">-- Load default file --</option>
    </select>

    <label class="btn">
      Upload File
      <input type="file" id="upload-btn" accept=".json,.yaml,.yml" style="display:none">
    </label>

    <button id="format-btn" class="btn">Format JSON</button>

    <div class="status" id="status-text">Ready</div>
  </div>

  <div class="main">
    <div class="editor-section" id="editor-pane"></div>
    <div class="swagger-section">
      <div id="swagger-ui"></div>
    </div>
  </div>

  <script>
    let editor;
    let swaggerUi;
    
    const defaultFiles = [
      { name: 'swagger.json', path: './data/swagger.json' },
      { name: 'api.github.com.yaml', path: './data/api.github.com.yaml' }
    ];

    function showStatus(text, isError = false) {
      const el = document.getElementById('status-text');
      el.textContent = text;
      el.style.color = isError ? 'red' : '#666';
    }

    async function init() {
      // 1. Init CodeMirror
      editor = CodeMirror(document.getElementById('editor-pane'), {
        mode: 'javascript',
        lineNumbers: true,
        theme: 'default',
        extraKeys: {"Ctrl-Space": "autocomplete"}
      });

      // 2. Setup Debounced Editor Change Event
      let timeout;
      editor.on('change', () => {
        clearTimeout(timeout);
        timeout = setTimeout(() => {
          localStorage.setItem('openapi-edit-content', editor.getValue());
          renderSwagger();
        }, 800);
      });

      // 3. Populate Select Options
      const select = document.getElementById('file-select');
      defaultFiles.forEach((f, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.text = f.name;
        select.appendChild(opt);
      });
      
      select.onchange = async () => {
        if (select.value === "") return;
        const file = defaultFiles[select.value];
        if (file) {
          showStatus(`Loading ${file.name}...`);
          try {
            const res = await fetch(file.path);
            if(!res.ok) throw new Error("Network response was not ok");
            const text = await res.text();
            setEditorContent(text, file.name);
            showStatus(`Loaded ${file.name}`);
          } catch(e) {
            showStatus(`Failed to load ${file.name}`, true);
          }
        }
        select.value = ""; // reset
      };

      // 4. File Upload Handler
      document.getElementById('upload-btn').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setEditorContent(event.target.result, file.name);
          showStatus(`Loaded local file: ${file.name}`);
        };
        reader.readAsText(file);
        e.target.value = ""; // reset
      };

      // 5. Format Button Handler
      document.getElementById('format-btn').onclick = () => {
        const content = editor.getValue();
        try {
          const parsed = JSON.parse(content);
          editor.setValue(JSON.stringify(parsed, null, 2));
          showStatus("JSON Formatted");
        } catch(e) {
          showStatus("Cannot format: Invalid JSON", true);
        }
      };

      // 6. Initial Load from LocalStorage or default
      const saved = localStorage.getItem('openapi-edit-content');
      if (saved) {
        setEditorContent(saved, saved.trim().startsWith('{') ? 'data.json' : 'data.yaml');
        showStatus("Loaded from local storage");
      } else {
        // Automatically load first default file
        select.value = 0;
        select.onchange();
      }
    }

    function setEditorContent(text, filename) {
      if (filename.endsWith('.yaml') || filename.endsWith('.yml')) {
        editor.setOption('mode', 'yaml');
      } else {
        editor.setOption('mode', 'javascript'); // CodeMirror json mode usually handled by javascript mode
      }
      editor.setValue(text);
      renderSwagger();
    }

    function renderSwagger() {
      const content = editor.getValue();
      if (!content.trim()) return;

      let spec;
      try {
        // Try parsing as JSON first, fallback to YAML
        if (content.trim().startsWith('{')) {
          spec = JSON.parse(content);
        } else {
          spec = jsyaml.load(content);
        }
        showStatus("Valid OpenAPI spec");
      } catch (e) {
        showStatus(`Parse error: ${e.message}`, true);
        return;
      }

      // Initialize SwaggerUI with object spec
      swaggerUi = SwaggerUIBundle({
        spec: spec,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout"
      });
    }

    window.onload = init;
  </script>
</body>
</html>
