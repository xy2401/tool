<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub API Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor">
                <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            <h1>GitHub API Explorer</h1>
        </div>
        <div class="header-actions" style="display: flex; gap: 8px;">
            <button id="btnTheme" class="btn btn-outline" title="Toggle Theme">🌓</button>
            <button id="btnSettings" class="btn btn-outline">Settings (PAT)</button>
        </div>
    </header>

    <main class="app-main">
        <div class="panel data-panel">
            <div class="panel-header">
                <h2>Query</h2>
                <div class="search-bar">
                    <input type="text" id="inputUsername" placeholder="Enter User or Org name (e.g. microsoft)" value="microsoft">
                    <button id="btnSearch" class="btn btn-primary">Search Repos</button>
                </div>
            </div>
            <div class="panel-toolbar">
                <div class="sort-group">
                    <label>Sort by:</label>
                    <select id="selectSort">
                        <option value="updated">Last Updated</option>
                        <option value="stars">Stars</option>
                        <option value="name">Name</option>
                    </select>
                </div>
                <div class="sort-group">
                    <label>Per Page:</label>
                    <select id="selectPerPage">
                        <option value="10">10</option>
                        <option value="30">30</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div class="filter-group">
                    <input type="text" id="inputFilter" placeholder="Filter by name...">
                </div>
                <div class="stats" id="repoStats">0 repos found</div>
            </div>
            <div class="repo-list" id="repoList">
                <div class="empty-state">Enter a username to search repositories</div>
            </div>
            <div class="pagination" id="paginationControls" style="display: none;">
                <button id="btnPrevPage" class="btn btn-outline" disabled>&laquo; Prev</button>
                <span id="pageIndicator">Page 1</span>
                <button id="btnNextPage" class="btn btn-outline" disabled>Next &raquo;</button>
            </div>
        </div>

        <div class="panel template-panel">
            <div class="panel-header">
                <h2>Markdown Generator</h2>
                <button id="btnCopy" class="btn btn-success">Copy Markdown</button>
            </div>
            <div class="template-editor">
                <label for="inputTemplate">Template Syntax (use ${key}):</label>
                <div class="template-help">Available: <code>name</code>, <code>html_url</code>, <code>description</code>, <code>language</code>, <code>stargazers_count</code>, <code>updated_at</code></div>
                <textarea id="inputTemplate" spellcheck="false">- [${name}](${html_url})
  > ${description}
  > ⭐ ${stargazers_count} | 🕒 ${updated_at}</textarea>
            </div>
            <div class="tabs-area" style="display: flex; flex-direction: column; flex: 2; padding: 0 16px 16px;">
                <div class="tab-headers" style="display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 8px;">
                    <button class="tab-btn active" data-target="panePreview">Generated Output</button>
                    <button class="tab-btn" data-target="paneJson">Raw JSON</button>
                </div>
                <div id="panePreview" class="tab-pane active" style="flex: 1; display: flex;">
                    <textarea id="outputPreview" readonly style="flex: 1;"></textarea>
                </div>
                <div id="paneJson" class="tab-pane" style="flex: 1; display: none;">
                    <textarea id="outputJson" readonly style="flex: 1; font-family: monospace; font-size: 0.75rem;"></textarea>
                </div>
            </div>
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="btnCloseSettings" class="btn-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="inputPat">Personal Access Token (PAT)</label>
                    <input type="password" id="inputPat" placeholder="ghp_xxxxxxxxxxxx">
                    <p class="help-text">Your PAT is stored locally in your browser to bypass rate limits.</p>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btnSaveSettings" class="btn btn-primary">Save & Close</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
