<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Dev Tools 项目说明">
  <title>Dev Tools</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      color: #1f2328;
      background: #f6f8fa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      margin: 0;
      padding: 48px 20px;
    }

    .markdown-body {
      width: min(900px, 100%);
      margin: 0 auto;
      padding: clamp(24px, 5vw, 56px);
      border: 1px solid #d0d7de;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 12px 40px rgba(31, 35, 40, 0.08);
      line-height: 1.7;
      overflow-wrap: break-word;
    }

    .markdown-body h1,
    .markdown-body h2 {
      padding-bottom: 0.35em;
      border-bottom: 1px solid #d8dee4;
    }

    .markdown-body h1 {
      margin-top: 0;
      font-size: 2em;
    }

    .markdown-body h2 {
      margin-top: 1.8em;
      font-size: 1.5em;
    }

    .markdown-body a {
      color: #0969da;
    }

    .markdown-body code {
      padding: 0.2em 0.4em;
      border-radius: 5px;
      background: rgba(175, 184, 193, 0.2);
      font: 0.9em "Cascadia Code", Consolas, monospace;
    }

    .markdown-body pre {
      padding: 16px;
      border-radius: 8px;
      background: #f6f8fa;
      overflow: auto;
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
    }

    .markdown-body li + li {
      margin-top: 0.3em;
    }

    .status {
      color: #57606a;
      text-align: center;
    }

    .error {
      color: #cf222e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color: #e6edf3;
        background: #0d1117;
      }

      .markdown-body {
        border-color: #30363d;
        background: #161b22;
        box-shadow: none;
      }

      .markdown-body h1,
      .markdown-body h2 {
        border-color: #30363d;
      }

      .markdown-body a {
        color: #58a6ff;
      }

      .markdown-body code {
        background: rgba(110, 118, 129, 0.4);
      }

      .markdown-body pre {
        background: #0d1117;
      }

      .status {
        color: #8b949e;
      }

      .error {
        color: #ff7b72;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 0;
      }

      .markdown-body {
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main id="app" class="markdown-body">
    <p v-if="loading" class="status">正在加载 README.md...</p>
    <p v-else-if="error" class="status error">{{ error }}</p>
    <article v-else v-html="content"></article>
  </main>

  <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          content: "",
          error: "",
          loading: true
        };
      },
      async mounted() {
        try {
          const response = await fetch("./README.md");

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const markdown = await response.text();
          this.content = marked.parse(markdown);
        } catch (error) {
          this.error = "README.md 加载失败，请通过静态服务器访问此页面。";
          console.error(error);
        } finally {
          this.loading = false;
        }
      }
    }).mount("#app");
  </script>
</body>
</html>
