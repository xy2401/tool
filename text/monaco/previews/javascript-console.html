<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; worker-src __WORKER_ORIGIN__; style-src 'unsafe-inline'; connect-src 'none'; img-src data:">
  <style>
    :root { color-scheme: dark; font-family: "Cascadia Code", Consolas, monospace; }
    body { margin: 0; padding: 18px; color: #e6edf3; background: #0d1117; font-size: 13px; }
    h2 { margin: 0 0 14px; font: 700 16px system-ui, sans-serif; }
    .empty { color: #8b949e; }
    .row { display: grid; grid-template-columns: 52px minmax(0, 1fr); gap: 10px; padding: 8px 0; border-bottom: 1px solid #21262d; }
    .line { color: #8b949e; text-align: right; user-select: none; }
    .value { min-width: 0; white-space: pre-wrap; overflow-wrap: anywhere; }
    .log .value { color: #e6edf3; }
    .info .value { color: #58a6ff; }
    .warn .value { color: #d29922; }
    .error .value { color: #f85149; }
  </style>
</head>
<body>
  <h2>Console</h2>
  <div id="output"><p class="empty">正在运行...</p></div>
  <script>
    const source = __JAVASCRIPT_SOURCE__;
    const workerUrl = __WORKER_URL__;
    const output = document.getElementById("output");
    const worker = new Worker(workerUrl);
    const escapeHtml = value => String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
    const timer = setTimeout(() => {
      worker.terminate();
      output.innerHTML = '<div class="row error"><span class="line">超时</span><span class="value">执行超过 2 秒，已停止。</span></div>';
    }, 2000);

    worker.onmessage = event => {
      clearTimeout(timer);
      worker.terminate();
      const rows = event.data;
      output.innerHTML = rows.length
        ? rows.map(row => `
            <div class="row ${row.type}">
              <span class="line">${row.type}</span>
              <span class="value">${escapeHtml(row.value)}</span>
            </div>
          `).join("")
        : '<p class="empty">没有 Console 输出。</p>';
    };

    worker.onerror = event => {
      clearTimeout(timer);
      worker.terminate();
      output.innerHTML = `<div class="row error"><span class="line">错误</span><span class="value">${escapeHtml(event.message)}</span></div>`;
    };
    worker.postMessage(source);
  </script>
</body>
</html>
