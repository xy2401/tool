<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="基于 Monaco Editor 的在线文本与代码工具箱，支持智能语言识别、文件编辑、文本对比、JSON/YAML 转换、格式压缩、内容预览和 JavaScript Console 运行。">
  <title>Monaco 文本与代码工具箱</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="title">
        <span>
          Monaco 工具箱
          <span class="version">v0.55.1</span>
        </span>
        <span class="subtitle">编辑、对比、转换、预览与运行</span>
      </div>

      <label>
        Demo
        <select id="demo" disabled>
          <option>正在加载...</option>
        </select>
      </label>

      <button id="open-file" type="button">打开文件</button>
      <input id="file-input" class="file-input" type="file">
      <span id="file-status" class="file-status" aria-live="polite"></span>

      <label>
        语言
        <select id="language" disabled>
          <option>正在加载...</option>
        </select>
      </label>

      <label>
        Auto
        <select id="auto" disabled>
          <option>等待粘贴...</option>
        </select>
      </label>

      <label>
        主题
        <select id="theme">
          <option value="vs-dark">深色</option>
          <option value="vs">浅色</option>
          <option value="hc-black">高对比度</option>
        </select>
      </label>

      <label class="checkbox-label">
        <input id="minimap" type="checkbox">
        小地图
      </label>
    </header>

    <div class="feature-bar" aria-label="功能区域">
      <label class="checkbox-label">
        <input id="diff-enabled" type="checkbox">
        文本对比
      </label>

      <label>
        对比模式
        <select id="diff-mode" disabled>
          <option value="side-by-side">并排</option>
          <option value="inline">行内</option>
        </select>
      </label>

      <button id="sort-json-diff" type="button" hidden>
        JSON 属性自然排序
      </button>

      <label id="workspace-layout-control" hidden>
        布局
        <select id="workspace-layout">
          <option value="editor">仅代码</option>
          <option value="split" selected>双栏预览</option>
          <option value="preview">仅预览</option>
        </select>
      </label>
      <span id="preview-status" style="color: #58a6ff; font-size: 0.85rem;" hidden></span>

      <button id="html-to-markdown" type="button" hidden>转为 Markdown</button>
      <button id="undo-html-to-markdown" type="button" hidden>撤销 Markdown 转换</button>
      <button id="preview-screenshot" type="button" title="进入网页截图模式" hidden>📷 网页截图</button>
      <button id="code-snapshot-button" type="button" title="给纯代码拍一张绝美快照">📸 代码快照</button>
      <button id="open-external-preview" type="button" title="在新窗口独立打开预览" hidden>↗️ 新窗口</button>

      <button id="json-to-yaml" type="button" hidden>
        JSON 转 YAML
      </button>

      <button id="yaml-to-json" type="button" hidden>
        YAML 转 JSON
      </button>

      <button id="minify-one-line" type="button" hidden>
        压缩为一行
      </button>

      <span id="conversion-status" class="conversion-status" aria-live="polite"></span>
    </div>

    <div id="screenshot-toolbar" class="feature-bar" hidden aria-label="截图调整区域">
      <label>
        尺寸
        <select id="screenshot-size">
          <option id="screenshot-size-current" value="auto">当前设备</option>
          <option value="auto">自适应 (当前预览宽度)</option>
          <option value="393,852">iPhone 15/16 Pro (393 x 852)</option>
          <option value="430,932">iPhone 15/16 Pro Max (430 x 932)</option>
          <option value="834,1194">iPad Pro 11" (834 x 1194)</option>
          <option value="1024,768">网页 (经典 1024 x 768)</option>
        </select>
      </label>

      <label class="checkbox-label">
        <input id="screenshot-truncate" type="checkbox">
        长图切片 (分页分发)
      </label>
      <div style="flex-grow: 1;"></div>

      <button id="screenshot-confirm" type="button" style="background: #238636; border-color: #2ea043;">📷 开始截图</button>
      <button id="screenshot-cancel" type="button" style="background: transparent; color: #f85149; border-color: #f85149;">❌ 取消</button>
    </div>

    <div id="code-snapshot-toolbar" class="feature-bar" hidden aria-label="代码快照设置">
      <label>
        引擎
        <select id="snapshot-engine">
          <option value="monaco">Monaco (极高精度)</option>
          <option value="highlight">Highlight.js (静态优美)</option>
        </select>
      </label>
      <label>
        主题
        <select id="snapshot-theme">
          <!-- Populated dynamically based on engine -->
        </select>
      </label>
      <label>
        背景
        <select id="snapshot-background">
          <option value="linear-gradient(140deg, rgb(207, 47, 152), rgb(106, 61, 236))">紫色梦幻</option>
          <option value="linear-gradient(140deg, rgb(165, 142, 251), rgb(243, 225, 235))">暮光之城</option>
          <option value="linear-gradient(140deg, rgb(255, 99, 99), rgb(115, 52, 221))">火红渐变</option>
          <option value="linear-gradient(140deg, rgb(142, 199, 251), rgb(28, 85, 170))">深邃海洋</option>
          <option value="linear-gradient(140deg, rgb(255, 207, 115), rgb(255, 122, 47))">日落黄昏</option>
          <option value="linear-gradient(140deg, rgb(205, 237, 246), rgb(255, 187, 201))">棉花糖</option>
          <option value="#1e1e1e">暗黑纯色</option>
        </select>
      </label>
      <label>
        边距
        <select id="snapshot-padding">
          <option value="64px">大 (64px)</option>
          <option value="32px">中 (32px)</option>
          <option value="16px">小 (16px)</option>
          <option value="128px">超大 (128px)</option>
        </select>
      </label>
      <label>
        视窗
        <select id="snapshot-window-style">
          <option value="mac">macOS</option>
          <option value="windows">Windows</option>
          <option value="none">无边框</option>
        </select>
      </label>
      
      <div style="flex-grow: 1;"></div>
      
      <button id="code-snapshot-confirm" type="button" style="background: #238636; border-color: #2ea043;">⬇️ 导出快照</button>
      <button id="code-snapshot-cancel" type="button" style="background: transparent; color: #f85149; border-color: #f85149;">❌ 退出</button>
    </div>

    <main id="workspace">
      <div id="editor">
        <p class="status">正在加载 Monaco Editor...</p>
      </div>
      <iframe id="html-preview" sandbox="allow-scripts"></iframe>
      
      <div id="snapshot-card" hidden>
        <div id="snapshot-window">
          <div id="snapshot-window-header">
            <div class="mac-dots"><span></span><span></span><span></span></div>
            <div class="win-controls" hidden><span>—</span><span>□</span><span>×</span></div>
          </div>
          <div id="snapshot-code-content"></div>
        </div>
      </div>
    </main>
  </div>
  
  <div id="screenshot-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="title">图片生成预览</h3>
        <button id="screenshot-modal-close" type="button" title="关闭并返回调整">❌</button>
      </div>
      <div class="modal-body">
        <p id="screenshot-modal-tip" style="color:#8b949e;font-size:13px;margin:0 0 10px 0;text-align:center;flex-shrink:0;">请预览生成的图片。如果在微信等 APP 内无法下载，请长按图片保存。</p>
        <div id="screenshot-modal-images-container">
          <div id="screenshot-modal-images"></div>
          <div id="screenshot-modal-counter" hidden>1 / 1</div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="screenshot-modal-download" type="button" style="background:#238636;border-color:#2ea043;">⬇️ 确认下载</button>
      </div>
    </div>
  </div>

  <script src="./monaco-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.10/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.4/lib/turndown.browser.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.1/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>
  <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.js"></script>
  <script src="./app.js"></script>
</body>
</html>
