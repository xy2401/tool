<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="基于最新版 Monaco Editor 的在线文本与代码编辑器">
  <title>Monaco 编辑器</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #e6edf3;
      background: #0d1117;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    #app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 10px 14px;
      border-bottom: 1px solid #30363d;
      background: #161b22;
    }

    .title {
      margin-right: auto;
      font-size: 1rem;
      font-weight: 750;
    }

    .version {
      color: #8b949e;
      font: 0.75rem "Cascadia Code", Consolas, monospace;
    }

    label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: #8b949e;
      font-size: 0.82rem;
    }

    select,
    button {
      min-height: 34px;
      border: 1px solid #30363d;
      border-radius: 7px;
      color: #e6edf3;
      background: #0d1117;
      font: inherit;
    }

    select {
      padding: 0 30px 0 10px;
    }

    button {
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover,
    select:hover {
      border-color: #58a6ff;
    }

    #editor {
      min-width: 0;
      min-height: 0;
    }

    .status {
      display: grid;
      height: 100%;
      color: #8b949e;
      place-items: center;
    }

    @media (max-width: 720px) {
      .title {
        width: 100%;
      }

      label {
        flex: 1 1 140px;
      }

      select {
        flex: 1;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="title">
        Monaco 编辑器
        <span class="version">v0.55.1</span>
      </div>

      <label>
        语言
        <select id="language" disabled>
          <option>正在加载...</option>
        </select>
      </label>

      <label>
        Auto
        <select id="auto" disabled>
          <option>等待粘贴...</option>
        </select>
      </label>

      <label>
        Demo
        <select id="demo" disabled>
          <option>正在加载...</option>
        </select>
      </label>

      <label>
        主题
        <select id="theme">
          <option value="vs-dark">深色</option>
          <option value="vs">浅色</option>
          <option value="hc-black">高对比度</option>
        </select>
      </label>

      <button id="format" type="button" disabled>格式化</button>
    </header>

    <main id="editor">
      <p class="status">正在加载 Monaco Editor...</p>
    </main>
  </div>

  <script>
    const MONACO_VERSION = "0.55.1";
    const MONACO_BASE_URL =
      `https://cdn.jsdelivr.net/npm/monaco-editor@${MONACO_VERSION}/min/`;
    const MONACO_WORKERS = {
      editorWorkerService: "editor.worker-Be8ye1pW.js",
      css: "css.worker-HnVq6Ewq.js",
      less: "css.worker-HnVq6Ewq.js",
      scss: "css.worker-HnVq6Ewq.js",
      handlebars: "html.worker-B51mlPHg.js",
      html: "html.worker-B51mlPHg.js",
      razor: "html.worker-B51mlPHg.js",
      json: "json.worker-DKiEKt88.js",
      javascript: "ts.worker-CMbG-7ft.js",
      typescript: "ts.worker-CMbG-7ft.js"
    };

    window.MonacoEnvironment = {
      getWorkerUrl(moduleId, label) {
        const worker = MONACO_WORKERS[label] || MONACO_WORKERS.editorWorkerService;
        const source =
          `importScripts("${MONACO_BASE_URL}vs/assets/${worker}");`;

        return `data:text/javascript;charset=utf-8,${encodeURIComponent(source)}`;
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.js"></script>
  <script>
    require.config({
      paths: {
        vs: `${MONACO_BASE_URL}vs`
      }
    });

    require(["vs/editor/editor.main"], async () => {
      const editorNode = document.getElementById("editor");
      const languageSelect = document.getElementById("language");
      const autoSelect = document.getElementById("auto");
      const demoSelect = document.getElementById("demo");
      const themeSelect = document.getElementById("theme");
      const formatButton = document.getElementById("format");
      let sampleFiles = {};

      try {
        const response = await fetch("./languages/index.json");
        if (response.ok) {
          sampleFiles = await response.json();
        }
      } catch (error) {
        console.warn("语言示例清单加载失败", error);
      }

      async function loadSample(language) {
        const file = sampleFiles[language];

        if (!file) {
          return "";
        }

        try {
          const response = await fetch(`./languages/${file}`);
          return response.ok ? await response.text() : "";
        } catch (error) {
          console.warn(`${language} 示例加载失败`, error);
          return "";
        }
      }

      function detectLanguage(value) {
        const text = value.trim();

        if (!text) {
          return {
            language: null,
            ranking: []
          };
        }

        const scores = {
          css: 0,
          go: 0,
          html: 0,
          java: 0,
          javascript: 0,
          json: 0,
          markdown: 0,
          php: 0,
          python: 0,
          sql: 0,
          typescript: 0,
          xml: 0,
          yaml: 0
        };
        const add = (language, points, pattern) => {
          if (pattern.test(text)) {
            scores[language] += points;
          }
        };

        try {
          JSON.parse(text);
          scores.json += 100;
        } catch {}

        // PHP：文件通常以 <?php 开始，并大量使用 $变量和 echo。
        add("php", 12, /^<\?php\b/i);
        add("php", 4, /\$\w+\s*=/);
        add("php", 3, /\becho\s+["']/);

        // HTML：完整文档标签权重最高，成对的语义标签和普通标签依次降权。
        add("html", 14, /^<!doctype\s+html\b/i);
        add("html", 10, /<html\b[\s>][\s\S]*<\/html>/i);
        add("html", 7, /<(head|body)\b[\s>][\s\S]*<\/\1>/i);
        add("html", 5, /<(div|section|main|header|footer|article)\b[\s>][\s\S]*<\/\1>/i);
        add("html", 3, /<(script|style)\b[\s>][\s\S]*<\/\1>/i);
        add("html", 2, /<[a-z][\w-]*(?:\s+[^<>]*)?>/i);

        // XML：XML 声明是强特征；完整根节点和闭合标签作为辅助特征。
        add("xml", 12, /^<\?xml\b/i);
        add("xml", 7, /^<[\w:-]+(?:\s+[\w:-]+="[^"]*")*\s*>[\s\S]*<\/[\w:-]+>\s*$/i);
        add("xml", 2, /<\/[\w:-]+>/);

        // Markdown：围栏代码、标题和链接较可靠；引用、列表、粗体和表格用于叠加判断。
        add("markdown", 5, /(^|\n)\s*```[\w-]*\s*$/);
        add("markdown", 4, /(^|\n)\s{0,3}#{1,6}\s+\S/);
        add("markdown", 3, /\[[^\]]+\]\([^)]+\)/);
        add("markdown", 2, /(^|\n)\s*>\s+\S/);
        add("markdown", 2, /(^|\n)\s*[-*+]\s+\S/);
        add("markdown", 2, /(^|\n)\s*\d+\.\s+\S/);
        add("markdown", 2, /(^|[^*])\*\*[^*\n]+\*\*/);
        add("markdown", 2, /(^|\n)\s*\|.+\|\s*$/);
        // 出现完整 HTML 文档时降低 Markdown 得分，避免被正文中的 # 或列表误导。
        add("markdown", -4, /^<!doctype\s+html\b|<html\b[\s>]/i);
        // 同时出现标题和另一种 Markdown 结构时，说明它更像一篇 Markdown 文档。
        if (
          /(^|\n)\s{0,3}#{1,6}\s+\S/.test(text) &&
          (
            /(^|\n)\s*[-*+]\s+\S/.test(text) ||
            /\[[^\]]+\]\([^)]+\)/.test(text) ||
            /(^|[^*])\*\*[^*\n]+\*\*/.test(text) ||
            /(^|\n)\s*```[\w-]*\s*$/.test(text)
          )
        ) {
          scores.markdown += 4;
        }

        // SQL：语句开头与 FROM、WHERE、JOIN 等子句组合出现时可信度较高。
        add("sql", 6, /(^|\n)\s*(SELECT|INSERT\s+INTO|UPDATE|DELETE\s+FROM|CREATE\s+TABLE|ALTER\s+TABLE)\b/i);
        add("sql", 3, /\b(FROM|VALUES|SET|TABLE|WHERE|JOIN|GROUP\s+BY|ORDER\s+BY)\b/i);
        add("sql", 2, /;\s*$/);

        // Go：package、func 和 fmt 输出调用是常见且较独特的语法。
        add("go", 8, /(^|\n)\s*package\s+\w+/);
        add("go", 5, /(^|\n)\s*func\s+\w+\s*\(/);
        add("go", 3, /\bfmt\.(Print|Printf|Println)\s*\(/);

        // Java：访问修饰符、main 方法和 System.out.println 是主要特征。
        add("java", 7, /\b(public|private|protected)\s+(class|interface|static|void)\b/);
        add("java", 5, /\bSystem\.out\.println\s*\(/);
        add("java", 3, /\bpublic\s+static\s+void\s+main\s*\(/);

        // Python：以冒号结尾的 def/class、导入语句、print 和缩进关键字用于判断。
        add("python", 6, /(^|\n)\s*(def|class)\s+\w+.*:\s*$/);
        add("python", 4, /(^|\n)\s*(from\s+\w+\s+import|import\s+\w+)/);
        add("python", 3, /(^|\n)\s*print\s*\(/);
        add("python", 2, /(^|\n)\s+(return|yield|pass)\b/);

        // TypeScript：类型声明和类型标注用于区别普通 JavaScript。
        add("typescript", 6, /(^|\n)\s*(interface|type|enum)\s+\w+/);
        add("typescript", 5, /:\s*(string|number|boolean|unknown|never|void)(?:\[\])?\b/);
        add("typescript", 3, /\b(import|export)\s+type\b/);

        // CSS：选择器块、属性声明和 @media 等 at-rule 共同构成主要特征。
        add("css", 5, /(^|\n)\s*[.#]?[a-zA-Z][\w-]*(?:\s+[.#]?[\w-]+)*\s*\{/);
        add("css", 4, /[\w-]+\s*:\s*[^;{}]+;/);
        add("css", 3, /(^|\n)\s*@(?:media|supports|keyframes|import)\b/);

        // YAML：键值、数组项和缩进键用于判断；出现分号或花括号时主动扣分。
        add("yaml", 4, /^[\w.-]+\s*:\s*(?:\S.*)?$/m);
        add("yaml", 3, /(^|\n)\s+-\s+[\w"']/);
        add("yaml", 2, /^\s{2,}[\w.-]+\s*:/m);
        add("yaml", -5, /[;{}]/);

        // JavaScript：声明、console、箭头函数和模块语法加分；类型标注更偏向 TypeScript。
        add("javascript", 4, /\b(function|const|let|var|class|async)\b/);
        add("javascript", 4, /\bconsole\.(log|error|warn)\s*\(/);
        add("javascript", 3, /=>/);
        add("javascript", 2, /\b(import|export)\b/);
        add("javascript", -3, /:\s*(string|number|boolean|unknown|never|void)(?:\[\])?\b/);

        const ranking = Object.entries(scores)
          .sort((left, right) => right[1] - left[1]);
        const [bestLanguage, bestScore] = ranking[0];
        const secondScore = ranking[1][1];

        // 低于 4 分不自动识别；低分候选差距不足 2 分时也保持当前语言。
        const language =
          bestScore >= 4 && (bestScore >= 8 || bestScore - secondScore >= 2)
            ? bestLanguage
            : null;

        return {
          language,
          ranking
        };
      }

      function renderAutoScores(result) {
        const summary = document.createElement("option");
        summary.value = "";
        summary.textContent = result.language
          ? `识别：${result.language}`
          : "未能确定";
        summary.selected = true;

        const options = result.ranking.map(([language, score]) => {
          const option = document.createElement("option");
          option.value = language;
          option.textContent = `${language} · ${score}`;
          return option;
        });

        autoSelect.replaceChildren(summary, ...options);
        autoSelect.disabled = result.ranking.length === 0;
      }

      const initialValue = await loadSample("javascript");
      editorNode.replaceChildren();

      const editor = monaco.editor.create(editorNode, {
        value: initialValue,
        language: "javascript",
        theme: "vs-dark",
        automaticLayout: true,
        minimap: {
          enabled: false
        },
        fontSize: 14,
        padding: {
          top: 14
        },
        scrollBeyondLastLine: false
      });

      const languages = monaco.languages.getLanguages()
        .map(language => language.id)
        .sort((left, right) => left.localeCompare(right));

      languageSelect.replaceChildren(
        ...languages.map(language => {
          const option = document.createElement("option");
          option.value = language;
          option.textContent = language;
          option.selected = language === "javascript";
          return option;
        })
      );
      languageSelect.disabled = false;

      const demos = Object.keys(sampleFiles)
        .sort((left, right) => left.localeCompare(right));
      demoSelect.replaceChildren(
        ...demos.map(language => {
          const option = document.createElement("option");
          option.value = language;
          option.textContent = language;
          option.selected = language === "javascript";
          return option;
        })
      );
      demoSelect.disabled = false;
      formatButton.disabled = false;

      languageSelect.addEventListener("change", async () => {
        monaco.editor.setModelLanguage(editor.getModel(), languageSelect.value);
        editor.focus();
      });

      autoSelect.addEventListener("change", () => {
        if (!autoSelect.value) {
          return;
        }

        languageSelect.value = autoSelect.value;
        monaco.editor.setModelLanguage(editor.getModel(), autoSelect.value);
        editor.focus();
      });

      demoSelect.addEventListener("change", async () => {
        const language = demoSelect.value;
        const value = await loadSample(language);
        languageSelect.value = language;
        monaco.editor.setModelLanguage(editor.getModel(), language);
        editor.setValue(value);
        editor.setPosition({ lineNumber: 1, column: 1 });
        editor.focus();
      });

      editor.onDidPaste(() => {
        window.setTimeout(() => {
          const result = detectLanguage(editor.getValue());
          const language = result.language;
          renderAutoScores(result);

          if (!language || languageSelect.value === language) {
            return;
          }

          const optionExists = Array.from(languageSelect.options)
            .some(option => option.value === language);

          if (optionExists) {
            languageSelect.value = language;
            monaco.editor.setModelLanguage(editor.getModel(), language);
          }
        }, 0);
      });

      themeSelect.addEventListener("change", () => {
        monaco.editor.setTheme(themeSelect.value);
      });

      formatButton.addEventListener("click", async () => {
        const action = editor.getAction("editor.action.formatDocument");

        if (action) {
          await action.run();
        }

        editor.focus();
      });
    });
  </script>
</body>
</html>
