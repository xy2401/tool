<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="基于 Monaco Editor 的在线文本与代码工具箱，支持智能语言识别、文件编辑、文本对比、JSON/YAML 转换、格式压缩、内容预览和 JavaScript Console 运行。">
  <title>Monaco 文本与代码工具箱</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="title">
        <span>
          Monaco 工具箱
          <span class="version">v0.55.1</span>
        </span>
        <span class="subtitle">编辑、对比、转换、预览与运行</span>
      </div>

      <label>
        Demo
        <select id="demo" disabled>
          <option>正在加载...</option>
        </select>
      </label>

      <button id="open-file" type="button">打开文件</button>
      <input id="file-input" class="file-input" type="file">
      <span id="file-status" class="file-status" aria-live="polite"></span>

      <label>
        语言
        <select id="language" disabled>
          <option>正在加载...</option>
        </select>
      </label>

      <label>
        Auto
        <select id="auto" disabled>
          <option>等待粘贴...</option>
        </select>
      </label>

      <label>
        主题
        <select id="theme">
          <option value="vs-dark">深色</option>
          <option value="vs">浅色</option>
          <option value="hc-black">高对比度</option>
        </select>
      </label>

      <label class="checkbox-label">
        <input id="minimap" type="checkbox">
        小地图
      </label>
    </header>

    <div class="feature-bar" aria-label="功能区域">
      <label class="checkbox-label">
        <input id="diff-enabled" type="checkbox">
        文本对比
      </label>

      <label>
        对比模式
        <select id="diff-mode" disabled>
          <option value="side-by-side">并排</option>
          <option value="inline">行内</option>
        </select>
      </label>

      <button id="sort-json-diff" type="button" hidden>
        JSON 属性自然排序
      </button>

      <label class="checkbox-label preview-control html-preview-control" hidden>
        <input id="html-preview-enabled" type="checkbox">
        HTML 预览
      </label>

      <button id="html-to-markdown" class="html-preview-control" type="button" hidden>
        转为 Markdown
      </button>

      <button id="undo-html-to-markdown" type="button" hidden>撤销 Markdown 转换</button>
      <button id="preview-screenshot" type="button" title="进入截图配置模式" hidden>📷 截图</button>

      <label class="checkbox-label preview-control markdown-preview-control" hidden>
        <input id="markdown-preview-enabled" type="checkbox">
        Markdown 预览
      </label>

      <button id="open-external-preview" type="button" title="在新窗口独立打开预览" hidden>↗️ 新窗口</button>

      <label class="checkbox-label preview-control javascript-preview-control" hidden>
        <input id="javascript-preview-enabled" type="checkbox">
        JS 运行
      </label>

      <label class="checkbox-label preview-control svg-preview-control" hidden>
        <input id="svg-preview-enabled" type="checkbox">
        SVG 预览
      </label>

      <label class="checkbox-label preview-control base64-preview-control" hidden>
        <input id="base64-preview-enabled" type="checkbox">
        Base64 预览
      </label>

      <button id="json-to-yaml" type="button" hidden>
        JSON 转 YAML
      </button>

      <button id="yaml-to-json" type="button" hidden>
        YAML 转 JSON
      </button>

      <button id="minify-one-line" type="button" hidden>
        压缩为一行
      </button>

      <span id="conversion-status" class="conversion-status" aria-live="polite"></span>
    </div>

    <div id="screenshot-toolbar" class="feature-bar" hidden aria-label="截图调整区域">
      <label>
        尺寸
        <select id="screenshot-size">
          <option id="screenshot-size-current" value="auto">当前设备</option>
          <option value="auto">自适应 (当前预览宽度)</option>
          <option value="393,852">iPhone 15/16 Pro (393 x 852)</option>
          <option value="430,932">iPhone 15/16 Pro Max (430 x 932)</option>
          <option value="834,1194">iPad Pro 11" (834 x 1194)</option>
          <option value="1024,768">网页 (经典 1024 x 768)</option>
        </select>
      </label>

      <label class="checkbox-label">
        <input id="screenshot-truncate" type="checkbox">
        长图切片 (分页分发)
      </label>

      <button id="screenshot-confirm" type="button" title="确认生成图片并保存">
        💾 生成并保存
      </button>

      <button id="screenshot-cancel" type="button" title="退出截图模式">
        ❌ 退出
      </button>
    </div>

    <main id="workspace">
      <div id="editor">
        <p class="status">正在加载 Monaco Editor...</p>
      </div>
      <iframe
        id="html-preview"
        title="内容预览"
        sandbox="allow-scripts"
        referrerpolicy="no-referrer"
      ></iframe>
    </main>
  </div>
  
  <div id="screenshot-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="title">图片生成预览</h3>
        <button id="screenshot-modal-close" type="button" title="关闭并返回调整">❌</button>
      </div>
      <div class="modal-body">
        <p id="screenshot-modal-tip" style="color:#8b949e;font-size:13px;margin:0 0 10px 0;text-align:center;flex-shrink:0;">请预览生成的图片。如果在微信等 APP 内无法下载，请长按图片保存。</p>
        <div id="screenshot-modal-images-container">
          <div id="screenshot-modal-images"></div>
          <div id="screenshot-modal-counter" hidden>1 / 1</div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="screenshot-modal-download" type="button" style="background:#238636;border-color:#2ea043;">⬇️ 确认下载</button>
      </div>
    </div>
  </div>

  <script src="./monaco-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.10/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.2.4/lib/turndown.browser.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.1/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>
  <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.55.1/min/vs/loader.js"></script>
  <script src="./app.js"></script>
</body>
</html>
