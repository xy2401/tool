<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="使用 Svelte-JSONEditor 构建的 JSON 对比、展示与编辑工具，支持自适应暗色模式和混乱日志提取。">
  <title>JSON 编辑 - Svelte-JSONEditor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanilla-jsoneditor/themes/jse-theme-dark.css">
  
  <link rel="stylesheet" href="./editor.css">
</head>
<body class="theme-dark">

  <div id="app">
    <!-- Custom Toast Notification System -->
    <div class="toast-container" aria-live="polite">
      <div v-for="toast in toasts" :key="toast.id" :class="['toast', `toast-${toast.type}`]">
        <div class="toast-icon">
          <span v-if="toast.type === 'success'">✓</span>
          <span v-else-if="toast.type === 'error'">✗</span>
          <span v-else-if="toast.type === 'warning'">!</span>
          <span v-else>i</span>
        </div>
        <div class="toast-content">
          <div class="toast-title" v-text="toast.title"></div>
          <div class="toast-message" v-text="toast.message"></div>
        </div>
        <button class="toast-close" @click="removeToast(toast.id)" aria-label="关闭">&times;</button>
      </div>
    </div>

    <!-- Main Title Row -->
    <div class="main-title-row" style="padding: 1rem 2rem 0.5rem;">
      <div class="main-title-text">
        <h2>JSON 编辑 (Svelte-JSONEditor)</h2>
        <p>支持自适应主题，左侧代码，右侧树形，以及从日志等杂乱文本中提取 JSON 并双向传输同步。</p>
      </div>
      <div class="theme-selector-container" @dblclick.stop>
        <select class="input-field input-sm" v-model="themePreference" @change="applyThemePreference" style="width: 10em;">
          <option value="system">🌓 跟随系统</option>
          <option value="light">☀️ 浅色模式</option>
          <option value="dark">🌙 深色模式</option>
        </select>
      </div>
    </div>

    <!-- Input Textarea Card -->
    <div 
      class="glass-card input-card" 
      :class="{ 'fullscreen-mode': isRawFullscreen, 'drag-active': isDragging }" 
      style="margin: 0.5rem 2rem 0.5rem;"
      @dblclick.self="toggleRawFullscreen"
      @dragover.prevent="handleDragOver"
      @dragleave.prevent="handleDragLeave"
      @drop.prevent="handleDrop"
    >
      <div class="input-row">
        <div class="textarea-wrapper">
          <textarea 
            class="editor-textarea" 
            rows="3" 
            v-model="rawInput" 
            placeholder="在此输入、粘贴包含 JSON 的原始日志/文本&#10;直接将 JSON 文件拖入此处载入...&#10;（提示：双击卡片空白处或右上角图标切换全屏）"
            id="rawInputTextarea"
          ></textarea>
          <div class="textarea-actions-group">
            <button class="textarea-action-btn" @click="copyRawInput" data-tooltip="复制原始日志">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
              </svg>
            </button>
            <button class="textarea-action-btn" @click="downloadRawInput" data-tooltip="下载原始日志">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
              </svg>
            </button>
            <button class="textarea-action-btn" @click="toggleRawFullscreen" :data-tooltip="isRawFullscreen ? '退出全屏' : '全屏查看原始日志'">
              <svg v-if="!isRawFullscreen" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" />
              </svg>
              <svg v-else width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14h6m0 0v6m0-6L3 21m17-7h-6m0 0v6m0-6l7 7M4 10h6m0 0V4m0 6L3 3m17 7h-6m0 0V4m0 6l7-7" />
              </svg>
            </button>
          </div>
        </div>
        <div class="btn-group vertical-btn-group" @dblclick.stop>
          <select class="input-field" @change="handleDataSelect($event)">
            <option value="">-- 选择数据 --</option>
            <option disabled v-if="demoFiles.length > 0">── 示例数据 ──</option>
            <option v-for="item in demoFiles" :key="item.key" :value="'demo-' + item.key" v-text="item.name"></option>
            <option disabled v-if="savedItems.length > 0">── 保存数据 ──</option>
            <option v-for="(item, idx) in savedItems" :key="'saved-' + idx" :value="'saved-' + idx" v-text="item.name"></option>
            <option disabled v-if="historyItems.length > 0">── 历史数据 ──</option>
            <option v-for="(item, idx) in historyItems" :key="'hist-' + idx" :value="'hist-' + idx" v-text="item.name"></option>
            <option disabled>── 操作 ──</option>
            <option value="generate-100m">动态生成 100M 嵌套 JSON (性能测试)</option>
            <option value="save-current">保存当前数据</option>
            <option value="clear">清空当前数据</option>
            <option value="clear-saved" v-if="savedItems.length > 0">清空保存数据</option>
            <option value="clear-history" v-if="historyItems.length > 0">清空历史记录</option>
          </select>
          <button class="btn btn-primary" @click="extractRootJSON" id="extractBtn" :disabled="isParsing">
            {{ isParsing ? '解析中' : '提取 JSON' }}
          </button>
        </div>
        <div class="advanced-row" @dblclick.stop>
          <div class="advanced-status-line">
            <span class="advanced-title">高级功能</span>
            <label class="advanced-option" title="自动解构并解析内容中经过多次转义的字符串 JSON">
              <input type="checkbox" v-model="advancedOptions.parseStringifiedJson">
              <span>字符串 JSON</span>
            </label>
            <label class="advanced-option" title="深度扫描常规文本或长字符串内部潜在的嵌套 JSON 子串">
              <input type="checkbox" v-model="advancedOptions.scanStringJsonSubstrings">
              <span>嵌套扫描</span>
            </label>
            <label class="advanced-option" title="提取前先剔除换行符将文本合并为单行，适用于处理因终端长度受限而被意外截断换行的日志">
              <input type="checkbox" v-model="advancedOptions.mergeLines">
              <span>多行合并</span>
            </label>
            <span class="parse-status" v-text="parseProgressText"></span>
          </div>
          <div :class="['parse-progress-line', { active: parseProgress.active, indeterminate: parseProgress.indeterminate }]">
            <div class="parse-progress-fill" :style="{ width: parseProgress.indeterminate ? '38%' : parseProgress.percent + '%' }"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Instructions Bar -->
    <div class="instructions-bar">
      <div class="instructions-row">
        <div class="instruction-item">
          <span class="step-num">1</span>
          <span class="step-text">上方粘贴日志/文本并提取 JSON</span>
        </div>
        <div class="instruction-item">
          <span class="step-num">2</span>
          <span class="step-text">左侧编辑 JSON 代码文本</span>
        </div>
        <div class="instruction-item">
          <span class="step-num">3</span>
          <span class="step-text">右侧树形节点展开与修改</span>
        </div>
        <div class="instruction-item">
          <span class="step-num">4</span>
          <span class="step-text">点击标题栏同步按钮双向互传数据</span>
        </div>
      </div>
    </div>
 
    <!-- Editor Layout workspace -->
    <main class="editor-workspace">
      <div class="glass-card editor-panel">
        <div class="panel-header">
          <span>代码编辑器 (Left)</span>
          <div style="display: flex; gap: 0.35rem; align-items: center;">
            <button class="panel-header-btn" @click="copyEditor('left')" title="复制左侧 JSON">
              <span>复制</span>
            </button>
            <button class="panel-header-btn" @click="downloadEditor('left')" title="下载左侧 JSON">
              <span>下载</span>
            </button>
            <button class="panel-header-btn" @click="copyToRight" title="将左侧代码同步到右侧树形">
              <span>同步到右侧</span>
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="stroke-width: 2.5px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
              </svg>
            </button>
          </div>
        </div>
        <div id="editor-left" class="editor-container"></div>
      </div>
      
      <div class="glass-card editor-panel">
        <div class="panel-header">
          <div style="display: flex; gap: 0.35rem; align-items: center;">
            <button class="panel-header-btn" @click="copyToLeft" title="将右侧树形同步到左侧代码">
              <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="stroke-width: 2.5px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7M19 19l-7-7 7-7" />
              </svg>
              <span>同步到左侧</span>
            </button>
            <button class="panel-header-btn" @click="copyEditor('right')" title="复制右侧 JSON">
              <span>复制</span>
            </button>
            <button class="panel-header-btn" @click="downloadEditor('right')" title="下载右侧 JSON">
              <span>下载</span>
            </button>
          </div>
          <span>树形编辑器 (Right)</span>
        </div>
        <div id="editor-right" class="editor-container"></div>
      </div>
    </main>
  </div>

  <!-- Vue 3 global setup -->
  <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>

  <script src="./json-core.js"></script>
  <script type="module" src="./editor.js"></script>
</body>
</html>
