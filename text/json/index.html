<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个现代且高颜值的 JSON 深度提取、格式化与编辑工具，专为混合日志和多次转义 JSON 设计。">
  <title>JSON 提取查看 - Dev Tools</title>


  <link rel="stylesheet" href="./index.css">
</head>
<body>
  <script>
    (function() {
      try {
        var pref = localStorage.getItem('theme_preference') || 'system';
        var theme = pref === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : pref;
        if (theme === 'light') document.body.classList.add('theme-light');
        else document.body.classList.add('theme-dark');
      } catch (e) {}
    })();
  </script>
  <div id="app">
    <!-- Custom Toast Notification System -->
    <div class="toast-container" aria-live="polite">
      <div v-for="toast in toasts" :key="toast.id" :class="['toast', `toast-${toast.type}`]">
        <div class="toast-icon">
          <span v-if="toast.type === 'success'">✓</span>
          <span v-else-if="toast.type === 'error'">✗</span>
          <span v-else-if="toast.type === 'warning'">!</span>
          <span v-else>i</span>
        </div>
        <div class="toast-content">
          <div class="toast-title" v-text="toast.title"></div>
          <div class="toast-message" v-text="toast.message"></div>
        </div>
        <button class="toast-close" @click="removeToast(toast.id)" aria-label="关闭">&times;</button>
      </div>
    </div>

    <!-- Main Workspace Grid -->
    <main>
      <!-- Main Title Row -->
      <div class="main-title-row">
        <div class="main-title-text">
          <h2>JSON 提取查看</h2>
          <p>从混合文本中提取 JSON，自动解构多次转义内容，支持节点树局部修改与向源合并。</p>
        </div>
        <div class="theme-selector-container" @dblclick.stop>
          <button 
            class="btn-icon-only" 
            @click="themePreference = themePreference === 'dark' ? 'light' : 'dark'; applyThemePreference()" 
            :title="themePreference === 'dark' ? '切换为浅色模式' : '切换为深色模式'"
          >
            <svg v-if="themePreference === 'dark'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg v-else width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>
        </div>
      </div>

      <!-- Input Textarea Card -->
      <div 
        class="glass-card input-card" 
        :class="{ 'fullscreen-mode': isRawFullscreen, 'drag-active': isDragging }" 
        @dblclick.self="toggleRawFullscreen"
        @dragover.prevent="handleDragOver"
        @dragleave.prevent="handleDragLeave"
        @drop.prevent="handleDrop"
      >
        <div class="input-row">
          <div class="textarea-wrapper">
            <textarea 
              class="editor-textarea" 
              rows="3" 
              v-model="rawInput" 
              placeholder="建议优先拖入文件识别，尤其是 1M 以上大文本，避免复制粘贴造成浏览器卡顿&#10;也可以在此输入或粘贴包含 JSON 的原始日志/文本&#10;（提示：双击卡片空白处或右上角图标切换全屏）"
              id="rawInputTextarea"
            ></textarea>
            <div class="textarea-actions-group">
              <button class="textarea-action-btn" @click="copyRawInput" title="复制原始日志">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
              </button>
              <button class="textarea-action-btn" @click="downloadRawInput" title="下载原始日志">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
              </button>
              <button class="textarea-action-btn" @click="toggleRawFullscreen" :title="isRawFullscreen ? '退出全屏' : '全屏查看原始日志'">
                <svg v-if="!isRawFullscreen" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" />
                </svg>
                <svg v-else width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14h6m0 0v6m0-6L3 21m17-7h-6m0 0v6m0-6l7 7M4 10h6m0 0V4m0 6L3 3m17 7h-6m0 0V4m0 6l7-7" />
                </svg>
              </button>
            </div>
          </div>
          <div class="btn-group vertical-btn-group" @dblclick.stop>
            <select class="input-field" @change="handleDataSelect($event)">
              <option value="">-- 选择数据 --</option>
              <option disabled v-if="demoFiles.length > 0">── 示例数据 ──</option>
              <option v-for="item in demoFiles" :key="item.key" :value="'demo-' + item.key" v-text="item.name"></option>
              <option disabled v-if="savedItems.length > 0">── 保存数据 ──</option>
              <option v-for="(item, idx) in savedItems" :key="'saved-' + idx" :value="'saved-' + idx" v-text="item.name"></option>
              <option disabled v-if="historyItems.length > 0">── 历史数据 ──</option>
              <option v-for="(item, idx) in historyItems" :key="'hist-' + idx" :value="'hist-' + idx" v-text="item.name"></option>
              <option disabled>── 操作 ──</option>
              <option value="generate-100m">动态生成 100M 嵌套 JSON (性能测试)</option>
              <option value="save-current">保存当前数据</option>
              <option value="clear">清空当前数据</option>
              <option value="clear-saved" v-if="savedItems.length > 0">清空保存数据</option>
              <option value="clear-history" v-if="historyItems.length > 0">清空历史记录</option>
            </select>
            <button class="btn btn-primary" @click="extractRootJSON" id="extractBtn" :disabled="isParsing">
              {{ isParsing ? '解析中' : '提取 JSON' }}
            </button>
          </div>
          <div class="advanced-row" @dblclick.stop>
            <div class="advanced-status-line">
              <span class="advanced-title">高级功能</span>
              <label class="advanced-option" title="自动解构并解析内容中经过多次转义的字符串 JSON">
                <input type="checkbox" v-model="advancedOptions.parseStringifiedJson">
                <span>字符串 JSON</span>
              </label>
              <label class="advanced-option" title="深度扫描常规文本或长字符串内部潜在的嵌套 JSON 子串">
                <input type="checkbox" v-model="advancedOptions.scanStringJsonSubstrings">
                <span>嵌套扫描</span>
              </label>
              <label class="advanced-option" title="提取前先剔除换行符将文本合并为单行，适用于处理因终端长度受限而被意外截断换行的日志">
                <input type="checkbox" v-model="advancedOptions.mergeLines">
                <span>多行合并</span>
              </label>
              <span class="parse-status" v-text="parseProgressText"></span>
            </div>
            <div :class="['parse-progress-line', { active: parseProgress.active, indeterminate: parseProgress.indeterminate }]">
              <div class="parse-progress-fill" :style="{ width: parseProgress.indeterminate ? '38%' : parseProgress.percent + '%' }"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar Node Tree Navigation -->
      <aside class="sidebar glass-card">
        <div class="sidebar-header">
          <span>数据层级</span>
          <div style="display: flex; gap: 0.35rem; align-items: center; text-transform: none;">
            <template v-if="selectedNode && selectedNodeProperties.length > 0">
              <span 
                :class="['badge-secondary', 'bulk-state-badge', `bulk-state-${propertyBulkMode}`]"
                :title="'点击切换属性状态：' + bulkModeText(propertyBulkMode)"
                @click="toggleAllProperties"
              >属性 ({{ selectedNodeProperties.length }})</span>
            </template>
            <span 
              v-if="nodes.length > 1"
              :class="['badge-secondary', 'bulk-state-badge', `bulk-state-${nodeBulkMode}`]"
              :title="'点击切换节点状态：' + bulkModeText(nodeBulkMode)"
              @click="toggleAllNodes"
            >节点 ({{ nodes.length - 1 }})</span>
            <span v-else class="badge-secondary">节点 (0)</span>
          </div>
        </div>
        

        
        <!-- Empty State for Sidebar -->
        <div v-if="nodes.length === 0" class="empty-state" style="padding: 2rem 1rem; border: none;">
          <p style="font-size: 0.85rem;">暂无解析节点</p>
        </div>

        <!-- Scrollable Tree List -->
        <div v-else class="node-list-container">
          <template v-for="node in filteredNodes" :key="node.id">
            <!-- Node Item -->
            <div 
              :class="['node-item', { active: selectedNodeId === node.id }]"
              :style="{ paddingLeft: `${Math.max(0.85, node.path.length * 0.6)}rem` }"
              :title="node.id"
            >
              <!-- Collapse/Expand Toggle -->
              <span 
                v-if="hasChildren(node.id)" 
                class="node-toggle"
                @click.stop="toggleCollapse(node.id)"
              >{{ collapsedNodes.includes(node.id) ? '▶' : '▼' }}</span>
              <span v-else class="node-toggle-spacer"></span>
              <!-- Node Checkbox -->
              <input 
                v-if="node.id !== 'main'"
                type="checkbox" 
                :checked="!excludedNodes.includes(node.id)"
                @click.stop="toggleNodeCheckbox(node.id)"
                class="property-checkbox"
                style="margin-right: 0.4rem;"
              >
              <span class="node-name" @click.stop="selectNode(node.id)" v-text="node.name"></span>
              <span class="node-badge" @click.stop="selectNode(node.id)" v-text="node.type"></span>
            </div>

            <!-- Primitive Properties of selected node -->
            <template v-if="propertyBulkMode !== 'hidden' && selectedNodeId === node.id && selectedNodeProperties.length > 0">
              <div 
                v-for="prop in selectedNodeProperties" 
                :key="prop.key"
                class="node-item property-item"
                :style="{ paddingLeft: `${Math.max(0.85, node.path.length * 0.6) + 1.2}rem` }"
                @click.stop="toggleProperty(prop.key)"
              >
                <input 
                  type="checkbox" 
                  :checked="!excludedProperties.includes(prop.key)"
                  @click.stop="toggleProperty(prop.key)"
                  class="property-checkbox"
                >
                <span class="node-name property-name" v-text="prop.key"></span>
                <span class="node-badge property-badge" v-text="prop.type"></span>
              </div>
            </template>
          </template>
        </div>
      </aside>

      <!-- Main Contents Area -->
      <section class="content-area" style="display: flex; gap: 1rem;">
        <!-- Output View and Editor Card -->
        <div class="output-grid" style="flex: 1; display: flex; gap: 1rem;">
          <div class="glass-card viewer-panel" :class="{ 'fullscreen-mode': isEditFullscreen }" @dblclick.self="toggleEditFullscreen" style="flex: 1;">
            <!-- Header for output -->
            <div class="viewer-header" @dblclick="toggleEditFullscreen" style="cursor: pointer; user-select: none;" title="双击此处可最大化/还原编辑器">
              <div class="breadcrumb-nav" v-if="selectedNode" @dblclick.stop>
                <div v-for="(seg, idx) in breadcrumbSegments" :key="idx" class="breadcrumb-segment-wrapper">
                  <span v-if="idx > 0" class="breadcrumb-separator">›</span>
                  <div class="breadcrumb-segment" :class="{ 'has-dropdown': seg.siblings.length > 1 }">
                    <button 
                      class="breadcrumb-btn"
                      :class="{ 'breadcrumb-current': idx === breadcrumbSegments.length - 1 }"
                      @click.stop="selectNode(seg.nodeId)"
                    >{{ seg.label }}<svg v-if="seg.siblings.length > 1" class="breadcrumb-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg></button>
                    <div v-if="seg.siblings.length > 1" class="breadcrumb-dropdown">
                      <button 
                        v-for="sib in seg.siblings"
                        :key="sib.nodeId"
                        :class="['breadcrumb-dropdown-item', { active: sib.isSelected }]"
                        @click.stop="selectNode(sib.nodeId)"
                      >{{ sib.label }}<span class="breadcrumb-dropdown-type" v-if="sib.type" v-text="sib.type"></span></button>
                    </div>
                  </div>
                </div>
                <template v-if="breadcrumbChildOptions.length > 0">
                  <span class="breadcrumb-separator">›</span>
                  <select class="breadcrumb-child-select" @change="handleBreadcrumbChildSelect($event)" title="进入下级节点">
                    <option value="">进入下级...</option>
                    <option
                      v-for="child in breadcrumbChildOptions"
                      :key="child.nodeId"
                      :value="child.nodeId"
                    >{{ child.label }} · {{ child.type }}</option>
                  </select>
                </template>
              </div>
              <div class="section-title" v-else style="margin-bottom: 0;">
                <span>
                  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                  </svg>
                  JSON 数据编辑
                </span>
              </div>
              
              <div class="tabs-group" v-if="selectedNode" @dblclick.stop>
                <button class="tab-btn-compact" :class="{ active: activeTab === 'preview' }" @click="activeTab = 'preview'" title="查看与编辑 JSON 源码">
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
                  源码
                </button>
                <button class="tab-btn-compact" :class="{ active: activeTab === 'stats' }" @click="activeTab = 'stats'" title="节点层级与基础统计信息">
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                  统计
                </button>
                <button class="tab-btn-compact" :class="{ active: activeTab === 'paths' }" @click="activeTab = 'paths'" title="枚举全部子项的 JSONPath">
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" /></svg>
                  路径
                </button>
                <button class="tab-btn-compact" :class="{ active: activeTab === 'schema' }" @click="activeTab = 'schema'" title="基于当前节点推断的 YAML Schema">
                  <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>
                  Schema
                </button>
              </div>

              <div class="btn-group" v-if="selectedNode" @dblclick.stop>
                <select 
                  v-model="indentSpaces" 
                  @change="applyFormatting"
                  class="input-field input-sm"
                  style="width: 90px;"
                >
                  <option value="2">2 空格</option>
                  <option value="4">4 空格</option>
                  <option value="tabs">Tab</option>
                  <option value="compact">紧凑</option>
                </select>
                <button 
                  type="button"
                  :class="['btn', 'btn-sm', wordWrap ? 'btn-primary' : 'btn-secondary']" 
                  @click="wordWrap = !wordWrap" 
                  :title="wordWrap ? '禁用自动软换行' : '启用自动软换行'"
                >
                  软换行
                </button>

                <button 
                  type="button"
                  class="btn btn-sm btn-secondary" 
                  @click="reorderKeys" 
                  title="按自然排序（A-Z）递归重新排序所有属性名"
                >
                  重排序
                </button>

                <button class="btn btn-sm btn-success" @click="saveNodeChanges" id="saveBtn" :disabled="isPreviewTruncated">
                  保存并同步
                </button>
              </div>
            </div>

            <!-- Content state -->
            <div v-if="!selectedNode" class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <h3>未提取或选择节点</h3>
              <p>请在上方输入数据并点击“提取 JSON”按钮，或在左侧树结构中选择节点开始编辑。</p>
            </div>

            <div v-else class="textarea-wrapper" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;">
              
              <!-- IDE Single Textarea Content -->
              <div class="editor-with-lines" style="flex: 1; min-height: 0;">
                <div class="line-numbers" ref="lineNumbersRef" aria-hidden="true">{{ lineNumbersText }}</div>
                <textarea 
                  class="editor-textarea" 
                  :value="displayValue"
                  @input="handleInput"
                  @scroll="syncLineNumberScroll"
                  :readonly="isPreviewReadonly"
                  :style="{ whiteSpace: wordWrap ? 'pre-wrap' : 'pre', wordBreak: wordWrap ? 'break-all' : 'normal', height: '100%', borderRadius: 0, borderTop: 'none', borderBottom: 'none', backgroundColor: activeTab !== 'preview' ? 'var(--bg-hover)' : 'var(--editor-bg)' }"
                  placeholder="选择左侧节点进行查看或编辑..."
                  id="nodeJSONTextarea"
                ></textarea>
                
                <div class="textarea-actions-group" v-if="activeTab === 'preview'">
                  <button class="textarea-action-btn" @click="copyFormattedJSON" title="复制 JSON 数据">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                  </button>
                  <button class="textarea-action-btn" @click="downloadNodeJSON" title="下载 JSON 为文件">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                  </button>
                  <button class="textarea-action-btn" @click="toggleEditFullscreen" :title="isEditFullscreen ? '退出全屏' : '全屏查看节点JSON'">
                    <svg v-if="!isEditFullscreen" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" />
                    </svg>
                    <svg v-else width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14h6m0 0v6m0-6L3 21m17-7h-6m0 0v6m0-6l7 7M4 10h6m0 0V4m0 6L3 3m17 7h-6m0 0V4m0 6l7-7" />
                    </svg>
                  </button>
                </div>

                <div class="textarea-actions-group" v-if="activeTab === 'paths'">
                  <button class="textarea-action-btn" @click="copyPaths" title="复制所有路径">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                  </button>
                </div>

                <div class="textarea-actions-group" v-if="activeTab === 'schema'">
                  <button class="textarea-action-btn" @click="copySchema" title="复制 Schema">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
