<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="一个现代且高颜值的 JSON 深度提取、格式化与编辑工具，专为混合日志和多次转义 JSON 设计。">
  <title>JSON 提取查看 - Dev Tools</title>


  <link rel="stylesheet" href="./index.css">
</head>
<body>

  <div id="app">
    <!-- Custom Toast Notification System -->
    <div class="toast-container" aria-live="polite">
      <div v-for="toast in toasts" :key="toast.id" :class="['toast', `toast-${toast.type}`]">
        <div class="toast-icon">
          <span v-if="toast.type === 'success'">✓</span>
          <span v-else-if="toast.type === 'error'">✗</span>
          <span v-else-if="toast.type === 'warning'">!</span>
          <span v-else>i</span>
        </div>
        <div class="toast-content">
          <div class="toast-title" v-text="toast.title"></div>
          <div class="toast-message" v-text="toast.message"></div>
        </div>
        <button class="toast-close" @click="removeToast(toast.id)" aria-label="关闭">&times;</button>
      </div>
    </div>

    <!-- Main Workspace Grid -->
    <main>
      <!-- Main Title Row -->
      <div class="main-title-row">
        <div class="main-title-text">
          <h2>JSON 提取查看</h2>
          <p>从混合文本中提取 JSON，自动解构多次转义内容，支持节点树局部修改与向源合并。</p>
        </div>
        <div class="theme-selector-container" @dblclick.stop>
          <select class="input-field input-sm" v-model="themePreference" @change="applyThemePreference" style="width: 10em;">
            <option value="system">🌓 跟随系统</option>
            <option value="light">☀️ 浅色模式</option>
            <option value="dark">🌙 深色模式</option>
          </select>
        </div>
      </div>

      <!-- Input Textarea Card -->
      <div 
        class="glass-card input-card" 
        :class="{ 'fullscreen-mode': isRawFullscreen, 'drag-active': isDragging }" 
        @dblclick.self="toggleRawFullscreen"
        @dragover.prevent="handleDragOver"
        @dragleave.prevent="handleDragLeave"
        @drop.prevent="handleDrop"
      >
        <div class="input-row">
          <div class="textarea-wrapper">
            <textarea 
              class="editor-textarea" 
              rows="3" 
              v-model="rawInput" 
              placeholder="在此输入、粘贴包含 JSON 的原始日志/文本&#10;直接将 JSON 文件拖入此处载入...&#10;（提示：双击卡片空白处或右上角图标切换全屏）"
              id="rawInputTextarea"
            ></textarea>
            <div class="textarea-actions-group">
              <button class="textarea-action-btn" @click="copyRawInput" data-tooltip="复制原始日志">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                </svg>
              </button>
              <button class="textarea-action-btn" @click="downloadRawInput" data-tooltip="下载原始日志">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
              </button>
              <button class="textarea-action-btn" @click="toggleRawFullscreen" :data-tooltip="isRawFullscreen ? '退出全屏' : '全屏查看原始日志'">
                <svg v-if="!isRawFullscreen" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" />
                </svg>
                <svg v-else width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14h6m0 0v6m0-6L3 21m17-7h-6m0 0v6m0-6l7 7M4 10h6m0 0V4m0 6L3 3m17 7h-6m0 0V4m0 6l7-7" />
                </svg>
              </button>
            </div>
          </div>
          <div class="btn-group vertical-btn-group" @dblclick.stop>
            <select class="input-field" @change="handleDataSelect($event)">
              <option value="">-- 选择数据 --</option>
              <option disabled v-if="demoFiles.length > 0">── 示例数据 ──</option>
              <option v-for="item in demoFiles" :key="item.key" :value="'demo-' + item.key" v-text="item.name"></option>
              <option disabled v-if="historyItems.length > 0">── 历史数据 ──</option>
              <option v-for="(item, idx) in historyItems" :key="'hist-' + idx" :value="'hist-' + idx" v-text="item.name"></option>
              <option disabled>── 操作 ──</option>
              <option value="clear">清空当前数据</option>
              <option value="clear-history" v-if="historyItems.length > 0">清空历史记录</option>
            </select>
            <button class="btn btn-primary" @click="extractRootJSON" id="extractBtn">
              提取 JSON
            </button>
          </div>
        </div>
      </div>

      <!-- Sidebar Node Tree Navigation -->
      <aside class="sidebar glass-card">
        <div class="sidebar-header">
          <span>数据层级</span>
          <div style="display: flex; gap: 0.35rem; align-items: center; text-transform: none;">
            <span 
              :class="['badge-secondary', { 'badge-active': showPropertiesInTree }]" 
              style="cursor: pointer; user-select: none;"
              @click="showPropertiesInTree = !showPropertiesInTree"
              v-text="showPropertiesInTree ? '显示属性' : '隐藏属性'"
            ></span>
            <span class="badge-secondary" v-text="`${nodes.length} 节点`"></span>
          </div>
        </div>
        

        
        <!-- Empty State for Sidebar -->
        <div v-if="nodes.length === 0" class="empty-state" style="padding: 2rem 1rem; border: none;">
          <p style="font-size: 0.85rem;">暂无解析节点</p>
        </div>

        <!-- Scrollable Tree List -->
        <div v-else class="node-list-container">
          <template v-for="node in filteredNodes" :key="node.id">
            <!-- Node Item -->
            <div 
              :class="['node-item', { active: selectedNodeId === node.id }]"
              @click="node.id === 'main' ? selectNode(node.id) : toggleNodeCheckbox(node.id)"
              :style="{ paddingLeft: `${Math.max(0.85, node.path.length * 0.6)}rem` }"
              :title="node.id"
            >
              <!-- Node Checkbox (Root node 'main' has no parent, so show checkbox for all sub-nodes) -->
              <input 
                v-if="node.id !== 'main'"
                type="checkbox" 
                :checked="!excludedNodes.includes(node.id)"
                @click.stop="toggleNodeCheckbox(node.id)"
                class="property-checkbox"
                style="margin-right: 0.4rem;"
              >
              <span class="node-name" @click.stop="selectNode(node.id)" v-text="node.name"></span>
              <span class="node-badge" @click.stop="selectNode(node.id)" v-text="node.type"></span>
            </div>

            <!-- Primitive Properties of selected node -->
            <template v-if="selectedNodeId === node.id && showPropertiesInTree && selectedNodeProperties.length > 0">
              <div 
                v-for="prop in selectedNodeProperties" 
                :key="prop.key"
                class="node-item property-item"
                :style="{ paddingLeft: `${Math.max(0.85, node.path.length * 0.6) + 1.2}rem` }"
                @click.stop="toggleProperty(prop.key)"
              >
                <input 
                  type="checkbox" 
                  :checked="!excludedProperties.includes(prop.key)"
                  @click.stop="toggleProperty(prop.key)"
                  class="property-checkbox"
                >
                <span class="node-name property-name" v-text="prop.key"></span>
                <span class="node-badge property-badge" v-text="prop.type"></span>
              </div>
            </template>
          </template>
        </div>
      </aside>

      <!-- Main Contents Area -->
      <section class="content-area">
        <!-- Output View and Editor Card -->
        <div class="output-grid">
          <div class="glass-card viewer-panel" :class="{ 'fullscreen-mode': isEditFullscreen }" @dblclick.self="toggleEditFullscreen">
            <!-- Header for output -->
            <div class="viewer-header" @dblclick="toggleEditFullscreen" style="cursor: pointer; user-select: none;" title="双击此处可最大化/还原编辑器">
              <div class="section-title" style="margin-bottom: 0;">
                <span>
                  <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                  </svg>
                  当前选择节点 JSON 数据编辑
                </span>
                <span class="badge-secondary" v-if="selectedNode" v-text="`路径: ${selectedNode.id}`"></span>
              </div>
              <div class="btn-group" v-if="selectedNode" @dblclick.stop>
                <select 
                  v-model="indentSpaces" 
                  @change="applyFormatting"
                  class="input-field input-sm"
                  style="width: 90px;"
                >
                  <option value="2">2 空格</option>
                  <option value="4">4 空格</option>
                  <option value="tabs">Tab</option>
                  <option value="compact">紧凑</option>
                </select>
                <button 
                  type="button"
                  :class="['btn', 'btn-sm', wordWrap ? 'btn-primary' : 'btn-secondary']" 
                  @click="wordWrap = !wordWrap" 
                  :data-tooltip="wordWrap ? '禁用自动折行' : '启用自动折行'"
                >
                  折行
                </button>

                <button class="btn btn-sm btn-success" @click="saveNodeChanges" id="saveBtn">
                  保存并同步
                </button>
              </div>
            </div>

            <!-- Content state -->
            <div v-if="!selectedNode" class="empty-state">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              <h3>未提取或选择节点</h3>
              <p>请在上方输入数据并点击“提取 JSON”按钮，或在左侧树结构中选择节点开始编辑。</p>
            </div>

            <div v-else class="textarea-wrapper" style="flex: 1;">
              <textarea 
                class="editor-textarea" 
                rows="18" 
                v-model="editText"
                @input="isTextareaDirty = true"
                :style="{ whiteSpace: wordWrap ? 'pre-wrap' : 'pre', wordBreak: wordWrap ? 'break-all' : 'normal' }"
                placeholder="{"
                id="nodeJSONTextarea"
              ></textarea>
              <div class="textarea-actions-group">
                <button class="textarea-action-btn" @click="copyFormattedJSON" data-tooltip="复制 JSON 数据">
                  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                  </svg>
                </button>
                <button class="textarea-action-btn" @click="downloadNodeJSON" data-tooltip="下载 JSON 为文件">
                  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                  </svg>
                </button>
                <button class="textarea-action-btn" @click="toggleEditFullscreen" :data-tooltip="isEditFullscreen ? '退出全屏' : '全屏查看节点JSON'">
                  <svg v-if="!isEditFullscreen" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5v-4m0 4h-4m4 0l-5-5" />
                  </svg>
                  <svg v-else width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 14h6m0 0v6m0-6L3 21m17-7h-6m0 0v6m0-6l7 7M4 10h6m0 0V4m0 6L3 3m17 7h-6m0 0V4m0 6l7-7" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Vue 3 CDN (Locked version for stability) -->
  <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>

  <script src="./index.js"></script>
</body>
</html>
