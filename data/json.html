<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="JSON 格式化、压缩和校验工具">
  <title>JSON 工具 - Dev Tools</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, sans-serif; color: #f2f5f7; background: #0b0d10; }
    * { box-sizing: border-box; }
    body { min-width: 320px; min-height: 100vh; margin: 0; }
    main { width: min(1120px, 90vw); margin: 0 auto; padding: 5rem 0; }
    .page-heading { max-width: 720px; margin-bottom: 3rem; }
    .eyebrow { margin: 0 0 1rem; color: #72e2ae; font: 700 .75rem Consolas, monospace; letter-spacing: .14em; }
    h1 { margin: 0; font-size: clamp(2.35rem, 6vw, 4.5rem); line-height: .98; letter-spacing: -.065em; }
    .page-heading > p:last-child { margin: 1.35rem 0 0; color: #98a4b3; line-height: 1.75; }
    .workspace { min-height: 420px; overflow: hidden; border: 1px solid #29313a; border-radius: 1rem; background: #12161b; }
    .placeholder { display: grid; min-height: 420px; padding: 2rem; place-content: center; text-align: center; }
    .placeholder h2 { margin: 0 0 .65rem; }
    .placeholder p { margin: 0; color: #98a4b3; }
  </style>
</head>
<body>
  <main>
    <header class="page-heading">
      <p class="eyebrow">JSON TOOLKIT</p>
      <h1>JSON 工具</h1>
      <p>为 JSON 独立保留更适合结构化数据的操作空间。</p>
    </header>

    <section class="workspace">
      <div class="placeholder">
        <h2>JSON 工作区</h2>
        <p>格式化、压缩、校验和结构展示将在下一步实现。</p>
      </div>
    </section>
  </main>

</body>
</html>
