<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Monaco Editor Playground</title>
    <link data-inline="yes-please" href="https://cdn.jsdelivr.net/gh/microsoft/monaco-editor@v0.18.1/website/lib/bootstrap-cosmo.css" rel="stylesheet" />
	<link data-inline="yes-please" href="https://cdn.jsdelivr.net/gh/microsoft/monaco-editor@v0.18.1/website/lib/bootstrap-responsive.min.css" rel="stylesheet" />
	<link data-inline="yes-please" href="https://cdn.jsdelivr.net/gh/microsoft/monaco-editor@v0.18.1/website/all.css" rel="stylesheet" type="text/css" />
	<link data-inline="yes-please" href="https://cdn.jsdelivr.net/gh/microsoft/monaco-editor@v0.18.1/website/playground/spinner.css" rel="stylesheet" />
	<link data-inline="yes-please" href="https://cdn.jsdelivr.net/gh/microsoft/monaco-editor@v0.18.1/website/playground/playground.css" rel="stylesheet" />

	<link data-name="vs/editor/editor.main" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.18.1/min/vs/editor/editor.main.css">
     
</head>

<body class="playground-page">
  
    <div id="loading">
        <div class="spinner">
            <div class="rect1"></div>
            <div class="rect2"></div>
            <div class="rect3"></div>
            <div class="rect4"></div>
            <div class="rect5"></div>
        </div>
    </div>

    <section id="playground">
    </section>

    <!-- OR ANY OTHER AMD LOADER HERE INSTEAD OF loader.js -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.18.1/min/vs/loader.js"></script>

    <script data-inline="yes-please" src="https://cdn.jsdelivr.net/gh/microsoft/monaco-editor@v0.18.1/website/playground/new-samples/all.js"></script>
    <script data-inline="yes-please" src="monaco-playground.js"></script>

    <script>
        var MONACO_BASE_URL = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.18.1/min/';
        var MONACO_WEBSITE_URL = 'https://cdn.jsdelivr.net/gh/microsoft/monaco-editor@v0.18.1/website/';
        window.MonacoEnvironment = {
            getWorkerUrl: function () {
                return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(
                    "self.MonacoEnvironment={baseUrl:'" + MONACO_BASE_URL + "'};" +
                    "importScripts('" + MONACO_BASE_URL + "vs/base/worker/workerMain.js');"
                );
            }
        };
        require.config({ paths: { 'vs': MONACO_BASE_URL + 'vs' } });
 

    </script>


</body>

</html>
