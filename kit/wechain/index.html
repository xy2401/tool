<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>微信群接龙统计助手</title>
    <link rel="stylesheet" href="./app.css?v=1.0.8" />
  </head>
  <body>
    <div id="app" v-cloak>
      <header class="app-header">
        <div class="header-main">
          <button class="title-button" type="button" @click="openListPanel" title="切换或编辑列表">
            <h1>{{ activeList.name }}</h1>
            <span class="title-chevron" aria-hidden="true"></span>
          </button>
          <button class="status-line" type="button" @click="toggleNoticePanel">{{ noticeStatusText }}</button>
          <div class="header-actions">
            <button class="chat-button" type="button" title="查看文案" @click="toggleNoticePanel">💬</button>
            <button class="chat-button share-button" type="button" title="生成截图" @click="generateScreenshot">📸</button>
          </div>
        </div>
      </header>

      <main class="app-shell">
        <section class="matrix-wrap" aria-label="打卡矩阵">
          <div id="screenshot-zone" style="background: var(--panel); width: max-content; min-width: 100%;">
            <div class="export-header" id="export-header" style="display: none; text-align: center; padding: 16px 12px 12px;">
              <h2 style="margin: 0 0 6px; font-size: 20px; color: #21241f;">{{ activeList.name }}</h2>
              <p style="margin: 0; font-size: 14px; color: #71786d;">统计范围：{{ noticeStatusText }}</p>
            </div>
            <div class="matrix" :style="{ '--date-count': modal === 'screenshot' ? exportDateKeys.length : visibleDates.length }">
            <div class="corner cell head name-cell" @click="openAddMembers">
              <span>成员</span>
              <small>({{ activeMembers.length }})</small>
              <small v-if="frozenMembersCount > 0" style="color: #5c85b5;">冻结: {{ frozenMembersCount }}</small>
            </div>

            <div
              v-for="date in visibleDates"
              :key="'head-' + date.key"
              class="cell head date-head"
              v-show="modal !== 'screenshot' || exportDateKeys.includes(date.key)"
              :class="{
                today: date.key === todayKey,
                selected: dateModes[date.key] && dateModes[date.key] !== 'none',
                'month-start': date.isMonthStart,
                'month-break': date.isFirstVisibleMonthDay
              }"
            >
              <button class="date-paste-zone" type="button" @click="openPaste(date.key)" title="粘贴这天的接龙">
                <span>{{ date.label }}</span>
                <small>{{ date.weekday }}</small>
              </button>
              <button class="date-mode-zone" type="button" @click="cycleDateMode(date.key)" title="切换筛选状态">
                <span
                  class="ring-wrap"
                  :class="'ring-' + completionLevel(date.key)"
                  :style="{ '--pct': activeMembers.length ? dateCompletionRate(date.key) : 0 }"
                >
                  <b
                    class="mode-chip"
                    :class="'mode-' + getDateMode(date.key)"
                  >{{ modeSymbol(getDateMode(date.key)) }}</b>
                </span>
                <b
                  class="mode-label"
                  :class="['mode-label-' + getDateMode(date.key), { empty: getDateMode(date.key) === 'none' }]"
                >{{ modeText(getDateMode(date.key)) }}</b>
              </button>
            </div>

            <div v-if="!activeMembers.length" class="empty-guide">
              <div class="empty-icon">📋</div>
              <p>还没有成员<br>点击左上角 <strong>成员(0)</strong> 添加成员<br>或点击上方日期粘贴接龙文本</p>
              <div class="guide-actions">
                <button type="button" @click="openAddMembers">添加成员</button>
                <button type="button" @click="openPaste(todayKey)">粘贴接龙</button>
              </div>
            </div>

            <div v-else-if="hasActiveMemberFilter && !filteredMembers.length" class="empty-guide">
              <div class="empty-icon">🔎</div>
              <p>当前筛选没有匹配成员<br>切换日期状态可恢复显示</p>
            </div>

            <template v-for="group in groupedMembers" :key="group.key">
              <div class="group-row name-cell" :class="{ 'frozen-group': group.key === 'deleted' }">
                <span>{{ group.label }}</span>
                <small>{{ group.count }}</small>
              </div>
              <div class="group-fill" :style="{ gridColumn: '2 / span ' + (modal === 'screenshot' ? exportDateKeys.length : visibleDates.length) }"></div>

              <template v-for="member in group.members" :key="member.id">
                <div
                  class="cell person name-cell"
                  :class="{ deleted: member.deleted }"
                  @touchstart="startSwipe($event, member.id)"
                  @touchend="endSwipe($event, member.id)"
                  @contextmenu.prevent="openMemberMenu(member.id)"
                >
                  <span>{{ member.name }}</span>
                  <button class="person-more" type="button" title="人员操作" @click.stop="openMemberMenu(member.id)">…</button>
                </div>
                <button
                  v-for="date in visibleDates"
                  :key="member.id + '-' + date.key"
                  v-show="modal !== 'screenshot' || exportDateKeys.includes(date.key)"
                  class="cell mark"
                  :class="{ done: isDone(member.id, date.key), missing: !isDone(member.id, date.key), deleted: member.deleted }"
                  type="button"
                  @click="toggleMark(member.id, date.key)"
                >{{ isDone(member.id, date.key) ? '✓' : '-' }}</button>
              </template>
            </template>
          </div>
          </div>
        </section>

        <div v-if="showNoticePanel" class="modal-backdrop" @click.self="toggleNoticePanel" style="z-index: 30;"></div>
        <section v-if="showNoticePanel" class="notice-card" :class="{ celebrate: noticeSpark }">
          <div class="notice-top">
            <div>
              <strong>{{ noticeMeta }}</strong>
            </div>
            <div class="notice-actions">
              <button type="button" @click="copyText(noticeText)">复制</button>
              <button type="button" @click="randomizeNotice">换一句</button>
            </div>
          </div>
          <div class="notice-text" aria-label="生成的通知文案">{{ noticeText }}</div>
          <div class="roster-board">
            <section
              v-for="group in noticeRosterGroups"
              :key="group.key"
              class="roster-section"
              :class="[group.full ? 'done-roster' : 'missing-roster', { collapsed: noticeCollapsed[group.key] }]"
            >
              <div v-if="group.full && group.names.length" class="firework-field" aria-hidden="true">
                <i v-for="n in 12" :key="'fw-' + n"></i>
              </div>
              <div v-if="!group.full && group.names.length" class="encourage-field" aria-hidden="true"></div>
              <div class="roster-heading">
                <label class="group-check">
                  <input
                    type="checkbox"
                    :checked="isNoticeGroupSelected(group.key)"
                    :disabled="!group.names.length"
                    @change="toggleNoticeGroup(group.key, $event.target.checked)"
                  />
                  <span>
                    <span v-if="group.full" class="group-crowns" aria-hidden="true">
                      <span v-for="n in group.crowns" :key="group.key + '-crown-' + n">👑</span>
                    </span>
                    {{ group.label }}({{ group.names.length }}人)
                  </span>
                </label>
                <button class="roster-at" type="button" @click="copyNoticeGroupNames(group.key)" :disabled="!group.names.length">@名单</button>
                <button class="roster-fold" type="button" @click="toggleNoticeSection(group.key)">
                  <span class="fold-icon" :class="{ collapsed: noticeCollapsed[group.key] }" aria-hidden="true"></span>
                  {{ noticeCollapsed[group.key] ? '展开' : '折叠' }}
                </button>
              </div>
              <div v-if="!noticeCollapsed[group.key]" class="roster-list">
                <p v-if="!group.names.length" class="empty-roster">{{ group.emptyText }}</p>
                <button
                  v-for="item in group.items"
                  :key="group.key + '-' + item.name"
                  class="roster-name"
                  :class="group.full ? 'done-name' : 'missing-name'"
                  type="button"
                >
                  <span>{{ item.name }}</span>
                  <small v-if="!group.full && item.doneCount" class="mark-count flower-count" aria-label="已完成天数">
                    <span v-for="n in item.doneCount" :key="'flower-' + item.name + '-' + n">🌺</span>
                  </small>
                </button>
              </div>
            </section>
          </div>
          <div class="confetti" aria-hidden="true">
            <span v-for="n in 10" :key="n">🎉</span>
          </div>
        </section>
      </main>

      <div v-if="modal" class="modal-backdrop" @click.self="closeModal">
        <section class="modal">
          <header :class="{ 'paste-header': modal === 'paste' || modal === 'members' || modal === 'newcomers' }">
            <template v-if="modal === 'paste'">
              <h2>粘贴接龙</h2>
              <span class="paste-date">{{ pasteDate }}</span>
              <button class="primary compact-action" type="button" @click="applyPaste">更新</button>
            </template>
            <template v-else-if="modal === 'members'">
              <h2>新增人员</h2>
              <span class="paste-date"></span>
              <button class="primary compact-action" type="button" @click="addMembersFromText">添加</button>
            </template>
            <template v-else-if="modal === 'newcomers'">
              <h2>{{ pendingNames.length }}位新成员</h2>
              <span class="paste-date">是否添加？</span>
              <div class="newcomer-actions">
                <button class="compact-action soft-action" type="button" @click="skipPendingMembers">不添加</button>
                <button class="primary compact-action" type="button" @click="confirmPendingMembers">添加</button>
              </div>
            </template>
            <h2 v-else-if="modalTitle">{{ modalTitle }}</h2>
            <div class="modal-header-actions">
              <button v-if="modal === 'lists'" class="add-list-btn" type="button" @click="createList">+</button>
              <button class="icon-btn" type="button" @click="closeModal">×</button>
            </div>
          </header>

          <template v-if="modal === 'paste'">
            <textarea v-model="pasteText" placeholder="#接龙&#10;&#10;1. 小羊&#10;2. 风里跑&#10;3. 阿宁今天练腿"></textarea>
          </template>

          <template v-if="modal === 'newcomers'">
            <div class="new-names">
              <strong>发现新人员</strong>
              <label v-for="name in pendingNames" :key="name">
                <input type="checkbox" v-model="selectedPendingNames" :value="name" />
                {{ name }}
              </label>
            </div>
          </template>

          <template v-if="modal === 'members'">
            <p class="hint">可以粘贴微信群 @ 人文本、一行一个名字，也可以直接粘贴接龙打卡文本。</p>
            <textarea v-model="memberText" placeholder="@小羊 @风里跑&#10;或：&#10;1. 小羊&#10;2. 风里跑&#10;3. 阿宁今天练腿"></textarea>
            <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px;" v-if="activeMembers.length > 0">
              <button style="width: 100%;" type="button" @click="copyAllMembers">复制成员列表({{ activeMembers.length }}人)</button>
              <button class="danger-action" style="width: 100%;" type="button" @click="clearAllMembers">彻底清空所有成员</button>
            </div>
          </template>

          <template v-if="modal === 'lists'">
            <div class="list-manager">
              <div
                v-for="list in store.lists"
                :key="list.id"
                class="list-row"
                :class="{ active: list.id === store.activeListId }"
              >
                <div class="list-main">
                  <input
                    class="list-name-input"
                    v-model.trim="list.name"
                    @focus="switchList(list.id)"
                    @input="ensureListName(list)"
                  />
                  <span class="list-count">{{ list.members.filter(member => !member.deleted).length }}人</span>
                </div>
                <button type="button" class="mini-btn" @click="openCsv(list.id)">CSV</button>
                <button type="button" class="mini-btn danger" @click="deleteList(list.id)">删除</button>
              </div>
            </div>
          </template>

          <template v-if="modal === 'csv'">
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
              <button class="compact-action" type="button" @click="copyCsv">复制</button>
              <button class="compact-action" type="button" @click="downloadCsv">下载</button>
              <button class="compact-action danger-action" type="button" @click="editableCsvText = ''">清空</button>
              <button class="compact-action primary" type="button" @click="overwriteCsv">覆盖</button>
            </div>
            <textarea class="csv-viewer" wrap="off" v-model="editableCsvText"></textarea>
          </template>

          <template v-if="modal === 'member'">
            <div class="member-menu-name">{{ selectedMember?.name }}</div>
            <div class="member-menu-actions">
              <button v-if="selectedMember && !selectedMember.deleted" class="freeze-action" type="button" @click="softDeleteSelectedMember">冻结</button>
              <button v-if="selectedMember && !selectedMember.deleted" class="danger-action" type="button" @click="hardDeleteSelectedMember">彻底删除</button>
              <button v-if="selectedMember?.deleted" type="button" @click="restoreSelectedMember">恢复</button>
              <button v-if="selectedMember?.deleted" class="danger-action" type="button" @click="hardDeleteSelectedMember">彻底删除</button>
              <button type="button" @click="closeModal">取消</button>
            </div>
          </template>

          <template v-if="modal === 'screenshot'">
            <div class="screenshot-config">
              <h3 style="margin: 0 0 8px; font-size: 15px;">选择要导出的日期</h3>
              <div class="export-dates" style="display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px;">
                <label v-for="date in visibleDates" :key="'exp-' + date.key" style="display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 13px; flex: 0 0 auto; cursor: pointer;">
                  <input type="checkbox" :value="date.key" v-model="exportDateKeys" @change="updateScreenshot" style="width: 18px; height: 18px; margin: 0;" />
                  <span>{{ date.dayLabel }}</span>
                </label>
              </div>
            </div>
            <div class="screenshot-preview" style="position: relative;">
              <div v-if="isGeneratingScreenshot" style="position: absolute; inset: 0; background: rgba(255,255,255,0.7); display: grid; place-items: center; z-index: 10;">
                <span style="font-weight: bold; color: var(--green);">重新生成中...</span>
              </div>
              <img v-if="screenshotUrl" :src="screenshotUrl" alt="长按保存图片" style="max-width: 100%; border-radius: 8px; border: 1px solid var(--line); box-shadow: var(--shadow); display: block;" />
              <p v-if="screenshotUrl" class="hint" style="text-align: center; margin-top: 12px; font-weight: bold; color: var(--green);">👆 请长按上方图片保存到手机</p>
            </div>
          </template>
        </section>
      </div>

      <div v-if="toastVisible" class="toast-wrap" :class="{ hiding: toastHiding }">
        <div class="toast">{{ toastText }}</div>
      </div>
    </div>

    <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="./app.js?v=1.0.8"></script>
  </body>
</html>
